spring.application.name=API-HOTEL
server.port=${PORT:8080}
spring.main.banner-mode=off
spring.jpa.open-in-view=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

server.error.include-message=always
server.error.include-binding-errors=always
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ativar exibicao de SQL gerado pelo Hibernate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Se necessario, habilitar logs para detalhes da execucao da consulta:
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Seguranca: em producao defina JWT_SECRET e JWT_EXPIRATION
jwt.secret=${JWT_SECRET:${JMT_SECRET:teste123}}
# Tempo de expiracao do token em milissegundos
jwt.expiration=${JWT_EXPIRATION:86400000}
