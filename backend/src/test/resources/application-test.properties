# Perfil de teste: H2 em memória para CI/local sem PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Liquibase desativado em teste; schema criado pelo Hibernate
spring.liquibase.enabled=false
jwt.secret=teste123
jwt.expiration=86400000
